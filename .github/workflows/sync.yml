name: Sync HEN Cheats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # 1️⃣ Checkout your repo
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # 2️⃣ Configure git (once, up front)
      # --------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # --------------------------
      # 3️⃣ Clone upstream repo
      # --------------------------
      - name: Clone upstream
        run: |
          set -e
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # --------------------------
      # 4️⃣ Filter PPSA cheats
      # --------------------------
      - name: Build filtered collections
        run: |
          set -e

          rm -rf cheats
          mkdir -p cheats/mc4 cheats/json cheats/shn

          SRC="upstream/cheats"

          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/" \;
            fi

            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$txtfile" || true
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      # --------------------------
      # 5️⃣ Commit & push cheats
      # --------------------------
      - name: Commit cheats changes
        run: |
          set -e
          git add -A cheats

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync upstream cheats (PPSA only)"
            git push origin HEAD --force-with-lease
          fi

      # --------------------------
      # 6️⃣ Zip cheats folder
      # --------------------------
      - name: Zip cheats folder
        run: zip -r cheats.zip cheats

      # --------------------------
      # 7️⃣ Delete old rolling release
      # --------------------------
      - name: Delete old release if exists
        uses: dev-drprasad/delete-tag-and-release@v1.0
        continue-on-error: true   # safe to ignore on first run
        with:
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------
      # 8️⃣ Create rolling release
      # --------------------------
      - name: Create single rolling release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "HEN Cheats (Latest)"
          body: |
            Auto-updated PPSA cheats collection.
            Always contains the latest synced MC4, JSON, SHN data.
          files: cheats.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------
      # 9️⃣ Download upstream README safely
      # --------------------------
      - name: Download upstream README
        run: |
          mkdir -p docs
          curl -fLsS https://raw.githubusercontent.com/TeeKay87/HEN-Cheats-Collection/master/README.md \
            -o docs/upstream.md

      # --------------------------
      # 🔟 Build GitHub Pages dashboard
      # --------------------------
      - name: Build GitHub Pages site
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"

          # Escape HTML special characters to prevent injection / broken layout
          escaped_readme=$(sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' docs/upstream.md)

          cat > docs/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>HEN Cheats Dashboard</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; }
              pre  { background: #111; color: #eee; padding: 15px; white-space: pre-wrap; overflow-x: auto; }
              h1   { color: #333; }
              a    { color: #1e88e5; }
            </style>
          </head>
          <body>
            <h1>HEN Cheats (Auto Synced)</h1>
            <h2>📦 Upstream README</h2>
            <pre>${escaped_readme}</pre>
            <h2>📥 Download Latest Cheats</h2>
            <p><a href="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/cheats.zip">Download cheats.zip</a></p>
            <p>Last sync: $(date -u '+%Y-%m-%d %H:%M UTC')</p>
          </body>
          </html>
          EOF

      # --------------------------
      # 1️⃣1️⃣ Commit GitHub Pages update
      # --------------------------
      - name: Commit Pages update
        run: |
          set -e
          git add docs

          if git diff --cached --quiet; then
            echo "No Pages update"
          else
            git commit -m "Auto-update GitHub Pages dashboard"
            git push origin HEAD --force-with-lease
          fi
