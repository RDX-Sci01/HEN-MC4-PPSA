name: Sync HEN Cheats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      - name: Build filtered collections
        run: |
          set -e

          rm -rf cheats
          mkdir -p cheats/mc4 cheats/json cheats/shn

          SRC="upstream/cheats"

          # ---- MC4 folder ----
          find "$SRC/mc4" -type f -name 'PPSA*' -exec cp {} cheats/mc4/ \;
          if [ -f "$SRC/mc4.txt" ]; then
            grep '^PPSA' "$SRC/mc4.txt" > cheats/mc4.txt || true
          fi

          # ---- JSON folder ----
          if [ -d "$SRC/json" ]; then
            cp -r "$SRC/json/"* cheats/json/
          fi
          if [ -f "$SRC/json.txt" ]; then
            grep '.*' "$SRC/json.txt" > cheats/json.txt || true
          fi

          # ---- SHN folder ----
          if [ -d "$SRC/shn" ]; then
            cp -r "$SRC/shn/"* cheats/shn/
          fi
          if [ -f "$SRC/shn.txt" ]; then
            grep '.*' "$SRC/shn.txt" > cheats/shn.txt || true
          fi

      - name: Commit and push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cheats

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync upstream cheats: MC4, JSON, SHN"
          git push origin HEAD
