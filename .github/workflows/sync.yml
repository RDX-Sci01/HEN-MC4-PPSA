name: Sync HEN Cheats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream
        run: |
          set -e
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      - name: Build filtered collections
        run: |
          set -e

          rm -rf cheats
          mkdir -p cheats/mc4 cheats/json cheats/shn

          SRC="upstream/cheats"

          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/" \;
            fi

            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$txtfile" || true
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      - name: Commit and force push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A cheats

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Sync upstream cheats (PPSA only)"
          git push origin HEAD --force

      - name: Zip cheats folder
        run: zip -r cheats.zip cheats

      - name: Delete old release (if exists)
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create single rolling release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "HEN Cheats (Latest)"
          body: |
            Auto-updated PPSA cheats collection.
            Always contains the latest synced MC4, JSON, SHN data.
          files: cheats.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
