name: Sync HEN Cheats (PPSA Web Catalog)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # ----------------------------------------------------
      # BUILD FILTERED DATA
      # ----------------------------------------------------
      - name: Build PPSA dataset
        run: |
          set -e

          rm -rf cheats docs
          mkdir -p cheats docs

          SRC="upstream/cheats"

          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            mkdir -p "cheats/$folder/files"

            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/files/" \;
            fi

            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$folder/$txtfile" || true
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      # ----------------------------------------------------
      # GENERATE JSON + HTML DATA
      # ----------------------------------------------------
      - name: Build catalog (JSON + HTML)
        run: |
          set -e

          JSON="docs/catalog.json"
          HTML="docs/index.html"

          TMP=$(mktemp)

          for category in mc4 json shn; do
            FILE_DIR="cheats/$category/files"
            META_FILE="cheats/$category/$category.txt"

            [ -d "$FILE_DIR" ] || continue

            for file in "$FILE_DIR"/PPSA*; do
              [ -e "$file" ] || continue

              filename=$(basename "$file")
              ID="${filename%%_*}"

              LINE=$(grep "^$ID" "$META_FILE" 2>/dev/null | head -n1)

              if [ -n "$LINE" ]; then
                TITLE="${LINE#*=}"
                META=$(echo "$LINE" | cut -d'_' -f2)
                VERSION=$(echo "$META" | cut -d'.' -f1-3)
              else
                TITLE="Unknown"
                VERSION=$(echo "$filename" | cut -d'_' -f2 | cut -d'.' -f1-3)
              fi

              [ -z "$ID" ] && continue

              echo "$ID|$VERSION|$TITLE|$category" >> "$TMP"
            done
          done

          sort -t'|' -k1,1 -u "$TMP" > TMP_SORTED

          # ---------------- JSON ----------------
          echo "[" > "$JSON"
          first=1

          while IFS='|' read -r id version title category; do
            [ -z "$id" ] && continue

            if [ $first -eq 0 ]; then
              echo "," >> "$JSON"
            fi
            first=0

            echo "  {\"id\":\"$id\",\"version\":\"$version\",\"title\":\"$title\",\"category\":\"$category\"}" >> "$JSON"
          done < TMP_SORTED

          echo "]" >> "$JSON"

          # ---------------- HTML UI ----------------
          cat > "$HTML" << 'EOF'
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PPSA Catalog</title>

  <style>
    body { font-family: Arial; margin: 20px; }
    input { padding: 10px; width: 300px; margin-bottom: 15px; }

    .box {
      max-height: 500px;
      overflow-y: auto;
      border: 1px solid #ccc;
    }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
    th { background: #f4f4f4; position: sticky; top: 0; }
  </style>
</head>

<body>

<h2>PPSA Game Catalog</h2>

<input type="text" id="search" placeholder="Search..." onkeyup="filter()" />

<div class="box">
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Version</th>
      <th>Title</th>
      <th>Category</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
</div>

<script>
let data = [];

async function load() {
  const res = await fetch('catalog.json');
  data = await res.json();
  render(data);
}

function render(rows) {
  const body = document.getElementById("rows");
  body.innerHTML = "";

  rows.forEach(r => {
    body.innerHTML += `
      <tr>
        <td>${r.id}</td>
        <td>${r.version}</td>
        <td>${r.title}</td>
        <td>${r.category}</td>
      </tr>
    `;
  });
}

function filter() {
  const q = document.getElementById("search").value.toLowerCase();
  render(data.filter(r =>
    (r.id + r.title + r.category).toLowerCase().includes(q)
  ));
}

load();
</script>

</body>
</html>
EOF

          rm -f "$TMP" TMP_SORTED

      # ----------------------------------------------------
      # COMMIT & PUSH
      # ----------------------------------------------------
      - name: Commit and push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs cheats

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Full PPSA web catalog sync (JSON + UI)"
          git push origin HEAD --force-with-lease
