name: Update README Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # 1️⃣ Download upstream README
      # -----------------------------
      - name: Fetch upstream README
        run: |
          set -e
          curl -fLsS \
            https://raw.githubusercontent.com/TeeKay87/HEN-Cheats-Collection/master/README.md \
            -o upstream.md

      # -----------------------------
      # 2️⃣ Build safe injection block
      # -----------------------------
      - name: Build injection block
        run: |
          set -e

          rm -f upstream_block.txt

          printf "%s\n" "### 🔄 Upstream README" >> upstream_block.txt
          printf "%s\n" "" >> upstream_block.txt

          while IFS= read -r line; do
            printf "%s\n" "$line"
          done < upstream.md >> upstream_block.txt

      # -----------------------------
      # 3️⃣ Inject into README safely
      # -----------------------------
      - name: Inject upstream into README
        run: |
          set -e

          awk '
          BEGIN {
            while ((getline line < "upstream_block.txt") > 0) {
              block = block line "\n"
            }
            close("upstream_block.txt")
            skip = 0
          }

          /<!-- UPSTREAM:START -->/ {
            print
            printf "%s", block
            skip = 1
            next
          }

          /<!-- UPSTREAM:END -->/ {
            skip = 0
          }

          skip == 0 { print }
          ' README.md > README.tmp

          mv README.tmp README.md

      # -----------------------------
      # 4️⃣ Commit changes
      # -----------------------------
      - name: Commit update
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto update upstream README content"
          git push origin HEAD
