<!DOCTYPE html>
<html>
<head>
  <title>PPSA Game Catalog</title>
  <style>
    body { font-family: Arial; background:#111; color:#eee; padding:20px; }
    input { padding:10px; width:100%; margin-bottom:20px; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px; border-bottom:1px solid #333; }
    th { background:#222; }
    tr:hover { background:#1a1a1a; }
    .tag { padding:3px 6px; background:#333; border-radius:5px; }
  </style>
</head>
<body>

<h2>🎮 PPSA Game Catalog</h2>

<input id="search" placeholder="Search ID, title, category..." />

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Status</th>
      <th>ID</th>
      <th>Version</th>
      <th>Title</th>
      <th>Category</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
let data = [];

fetch("data.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    render(data);
  });

function render(rows) {
  const table = document.getElementById("table");
  table.innerHTML = "";
  rows.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${r.date}</td>
        <td>${r.status}</td>
        <td>${r.id}</td>
        <td>${r.version}</td>
        <td>${r.title}</td>
        <td><span class="tag">${r.category}</span></td>
      </tr>
    `;
  });
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  render(data.filter(r =>
    r.id.toLowerCase().includes(q) ||
    r.title.toLowerCase().includes(q) ||
    r.category.toLowerCase().includes(q)
  ));
});
</script>

</body>
</html>
